<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Input обработка ввода</title>
</head>
<body>
<form name="myForm">
    <input type="text" name="myname" id="key" placeholder="Введите имя:" />
    <input type="button" id="button" onclick="printForm()" value="Печать" />
</form>
<p id="print"></p>
<script>
    function printForm() {
        // const key = document.getElementById("key").value;
        // устаревшее поведение - обращаться к форме по имени
        const key = document.myForm.myname.value;
        // проверка валидности если нужно
        document.getElementById("print").innerHTML = `Вы ввели имя ${key}`;
    }
</script>
</body>
</html>
