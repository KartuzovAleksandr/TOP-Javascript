<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Navigator</title>
</head>
<body>
<div id="out">Широта ? Долгота ?</div>
<p>
    <!-- Элемент сам запросит данные при загрузке, если разрешите - кликните -->
    <!-- для Chrome 146+ -->
    <!-- точность - желательно 4 знака после запятой, потому что если только 2 - то это около км (зависит от широты - долготы) -->
    <geolocation autolocate onlocation="
        const {latitude: lat, longitude: lon} = event.target.position.coords;
        document.getElementById('out').innerText = `Широта ${lat.toFixed(4)} Долгота ${lon.toFixed(4)}`;">
    </geolocation>
<script>
    // Функция для успешного получения геопозиции
    function onSuccess(position) {
        console.log("Геопозиция получена:");
        console.log("Широта:", position.coords.latitude);
        console.log("Долгота:", position.coords.longitude);
        console.log("Точность:", position.coords.accuracy + " м");
    }
    // Функция для обработки ошибок
    function onFail(error) {
        switch (error.code) {
            case error.PERMISSION_DENIED:
                console.error("Пользователь отклонил запрос на геолокацию.");
                break;
            case error.POSITION_UNAVAILABLE:
                console.error("Данные о местоположении недоступны.");
                break;
            case error.TIMEOUT:
                console.error("Запрос истёк.");
                break;
            default:
                console.error("Неизвестная ошибка:", error.message);
        }
    }
    // Запрос геопозиции
    navigator.geolocation.getCurrentPosition(onSuccess, onFail);
</script>
</body>
</html>
