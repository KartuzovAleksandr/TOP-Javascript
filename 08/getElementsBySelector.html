<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Выбор элементов по селекторам</title>
</head>
<body>
<div id="article">
    <h1 id="header">Home Page</h1>
    <p class="text">Header Text 1</p>
    <p class="text">Header Text 2</p>
</div>
<div id="footer">
    <p class="text">Footer Text</p>
</div>
<script>
    // получаем элемент с id="article"
    const article = document.getElementById("article");
    // в этом элементе получаем все элементы с class="text"
    const articleContent = article.getElementsByClassName("text");
    console.log("Все элементы с id article и классом text");
    for (const p of articleContent) {
        console.log(p);
    }
    // ищем все с селектором класс text
    console.log("Все элементы с классом text");
    let textElements = document.getElementsByClassName("text");
    for (const p of textElements) {
        console.log(p);
    }
    // ищем все с селекторами id #article и класс .text
    textElements = document.querySelectorAll("#article .text");
    console.log("Все элементы с id article и классом text");
    for (const p of textElements) {
        console.log(p);
    }

</script>
</body>
</html>
