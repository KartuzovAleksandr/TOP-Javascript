<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Приватные поля и методы</title>
</head>
<body>
<script>
    class Person{
        #name;
        #age;
        constructor(name, age){
            this.#name = name;
            this.#age = age;
        }
        print(){
            console.log(`Name: ${this.#name}  Age: ${this.#age}`);
        }
    }
    const tom = new Person("Tom", 37);
    // Uncaught SyntaxError: Private field '#name' must be declared in an enclosing class
    // console.log(tom.#name);
    // tom.#name = "Sam";   // ! Ошибка - нельзя обратиться к приватному полю
    // tom.#age = -45;      // ! Ошибка - нельзя обратиться к приватному полю
    tom.print();    // Name: Tom  Age: 37
</script>
</body>
</html>
