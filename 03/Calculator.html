<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="s.css">
</head>
<body>
    <h2>Калькулятор</h2>
    
    <input type="number" id="num1" placeholder="Введите первое число" value="">
    <input type="number" id="num2" placeholder="Введите второе число" value="">
    
    <div class="buttons">
        <button class="btn-add" onclick="calculate('+')">+</button>
        <button class="btn-subtract" onclick="calculate('-')">-</button>
        <button class="btn-multiply" onclick="calculate('*')">×</button>
        <button class="btn-divide" onclick="calculate('/')">÷</button>
        <button class="btn-square" onclick="calculate('square1')">x² (1)</button>
        <button class="btn-square" onclick="calculate('square2')">x² (2)</button>
    </div>
    
    <h3>Результат: <span id="result">0</span></h3>

    <script>
    window.calculate = (operation) => {
        const num1 = parseFloat(document.getElementById('num1').value) || 0;
        const num2 = parseFloat(document.getElementById('num2').value) || 0;
        
        const add = (a, b) => a + b;
        const subtract = (a, b) => a - b;
        const multiply = (a, b) => a * b;
        const divide = (a, b) => b !== 0 ? a / b : 'Ошибка: деление на 0';
        const square1 = (a) => a * a;
        const square2 = (b) => b * b;
        
        const operations = {
            '+': add,
            '-': subtract,
            '*': multiply,
            '/': divide,
            'square1': square1,
            'square2': square2
        };
        
        let result;
        if (operation === 'square1') {
            result = operations[operation](num1);
        } else if (operation === 'square2') {
            result = operations[operation](num2);
        } else {
            result = operations[operation](num1, num2);
        }
        
        document.getElementById('result').textContent = result;
    };
    </script>
</body>
</html>
