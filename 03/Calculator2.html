<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 50px; }
        input, button { padding: 10px; margin: 5px; font-size: 16px; }
        #result { font-size: 24px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Калькулятор</h2>
    
    <input type="number" id="a" placeholder="Число A" value="0">
    <input type="number" id="b" placeholder="Число B" value="0">
    
    <br>
    
    <button onclick="calc.add()">+</button>
    <button onclick="calc.sub()">-</button>
    <button onclick="calc.mul()">×</button>
    <button onclick="calc.div()">÷</button>
    <button onclick="calc.dev()">^</button>
    <button onclick="calc.clr()">C</button>
    
    <div id="result">0</div>

    <script>
        const calc = {
            get: () => ({
                a: +document.getElementById('a').value || 0,
                b: +document.getElementById('b').value || 0
            }),
            
            set: (res) => document.getElementById('result').innerHTML = res,
            
            add: () => { const {a,b} = calc.get(); calc.set(a + b); },
            sub: () => { const {a,b} = calc.get(); calc.set(a - b); },
            mul: () => { const {a,b} = calc.get(); calc.set(a * b); },
            dev: () => { const {a,b} = calc.get(); calc.set(a ** b); },
            div: () => { 
                const {a,b} = calc.get(); 
                b === 0 ? calc.set('На 0 делить нельзя') : calc.set((a / b).toFixed(2));
            },
            clr: () => {
                document.getElementById('a').value = '';
                document.getElementById('b').value = '';
                calc.set('0');
            }
        };
    </script>
</body>
</html>
