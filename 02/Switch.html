<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Switch</title>
</head>
<body>
<script>
    const m = 3;
    let season;
    switch (m) {
        case 1: season = 'Зима';
            break;
        case 3: season = "Весна";
            break;
        default: season = "ЛЕТО";
            break;
    }
    document.write(season);
</script>

</body>
</html>
